<div class="notifications-page">
    <div class="page-header animate-slide-up">
        <div class="header-content">
            <div>
                <h1 class="page-title">Notifications</h1>
                <p class="page-subtitle">Track task assignments, project updates, and account alerts.</p>
            </div>
            <div class="notification-actions">
                <button class="btn btn-outline" id="employee-notification-refresh">
                    <i class="fas fa-sync-alt"></i>
                    Refresh
                </button>
                <button class="btn btn-outline" id="employee-mark-all-read">
                    <i class="fas fa-check-double"></i>
                    Mark All Read
                </button>
            </div>
        </div>
    </div>

    <div class="notifications-filter animate-slide-up animate-delay-100">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="unread">Unread</button>
        <button class="filter-btn" data-filter="task">Tasks</button>
        <button class="filter-btn" data-filter="project">Projects</button>
        <button class="filter-btn" data-filter="system">System</button>
        <button class="filter-btn" data-filter="leave">Leave</button>
    </div>

    <div class="notifications-list animate-slide-up animate-delay-200" id="employee-notifications-list">
        <div class="empty-state">
            <i class="fas fa-bell-slash"></i>
            <h3>Loading notifications...</h3>
            <p class="empty-subtext">TaskVise is fetching the latest updates for your account.</p>
        </div>
    </div>
</div>

<style>
.notifications-page {
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
}

.header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
}

.page-title {
    font-size: 2.25rem;
    font-weight: 700;
    margin: 0 0 8px;
    background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.page-subtitle {
    margin: 0;
    color: #64748b;
    font-size: 1rem;
}

.notification-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.notifications-filter {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin: 24px 0;
}

.filter-btn {
    border: 1px solid #dbeafe;
    background: #fff;
    color: #1e3a8a;
    padding: 10px 16px;
    border-radius: 999px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

.filter-btn:hover,
.filter-btn.active {
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    color: #fff;
    border-color: transparent;
}

.notifications-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.notification-card {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: flex-start;
    padding: 20px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
}

.notification-card.unread {
    border-color: #93c5fd;
    box-shadow: 0 14px 34px rgba(37, 99, 235, 0.12);
}

.notification-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #eff6ff;
    color: #2563eb;
    font-size: 1.1rem;
}

.notification-content h3 {
    margin: 0 0 6px;
    color: #0f172a;
    font-size: 1rem;
    font-weight: 700;
}

.notification-message {
    margin: 0 0 12px;
    color: #475569;
    line-height: 1.6;
}

.notification-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

.notification-time {
    color: #64748b;
    font-size: 0.875rem;
}

.notification-type {
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: capitalize;
    background: #eff6ff;
    color: #1d4ed8;
}

.notification-card.task .notification-type {
    background: #dbeafe;
    color: #1d4ed8;
}

.notification-card.project .notification-type {
    background: #dcfce7;
    color: #166534;
}

.notification-card.leave .notification-type {
    background: #ede9fe;
    color: #6d28d9;
}

.notification-card.system .notification-type {
    background: #e2e8f0;
    color: #334155;
}

.notification-actions-col {
    display: flex;
    gap: 8px;
    align-items: center;
}

.notification-dot {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: #2563eb;
    margin-top: 8px;
}

.empty-state {
    background: #fff;
    border: 1px dashed #cbd5e1;
    border-radius: 18px;
    padding: 36px 24px;
    text-align: center;
    color: #64748b;
}

.empty-state i {
    font-size: 2rem;
    margin-bottom: 12px;
    color: #94a3b8;
}

.empty-subtext {
    margin: 8px 0 0;
}

@media (max-width: 768px) {
    .header-content {
        flex-direction: column;
        align-items: flex-start;
    }

    .notification-card {
        grid-template-columns: 1fr;
    }

    .notification-actions-col {
        justify-content: flex-start;
    }
}
</style>

<script>
(function () {
    const state = {
        items: [],
        filter: 'all'
    };

    function showMessage(message, type = 'info') {
        if (typeof window.showToast === 'function') {
            window.showToast(message, type);
            return;
        }
        if (typeof window.showNotification === 'function') {
            window.showNotification(message, type);
            return;
        }
        console.log(type.toUpperCase() + ': ' + message);
    }

    function escapeHtml(value) {
        return String(value == null ? '' : value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function iconForType(type) {
        if (type === 'task') return 'tasks';
        if (type === 'project') return 'project-diagram';
        if (type === 'leave') return 'calendar-check';
        return 'bell';
    }

    function formatDate(value) {
        if (!value) return 'Just now';
        const parsed = new Date(value.replace(' ', 'T'));
        if (Number.isNaN(parsed.getTime())) return value;
        return parsed.toLocaleString([], {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    function filteredItems() {
        if (state.filter === 'all') return state.items;
        if (state.filter === 'unread') return state.items.filter((item) => !item.is_read);
        return state.items.filter((item) => item.type === state.filter);
    }

    function render() {
        const root = document.getElementById('employee-notifications-list');
        if (!root) return;

        const items = filteredItems();
        if (!items.length) {
            root.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-bell-slash"></i>
                    <h3>No notifications found</h3>
                    <p class="empty-subtext">Assignments, project updates, and system alerts will appear here.</p>
                </div>
            `;
            return;
        }

        root.innerHTML = items.map((item) => `
            <article class="notification-card ${escapeHtml(item.type || 'system')} ${item.is_read ? 'read' : 'unread'}">
                <div class="notification-icon">
                    <i class="fas fa-${iconForType(item.type)}"></i>
                </div>
                <div class="notification-content">
                    <h3>${escapeHtml(item.title || 'Notification')}</h3>
                    <p class="notification-message">${escapeHtml(item.message || '')}</p>
                    <div class="notification-meta">
                        <span class="notification-time">${escapeHtml(formatDate(item.created_at))}</span>
                        <span class="notification-type">${escapeHtml(item.type || 'system')}</span>
                    </div>
                </div>
                <div class="notification-actions-col">
                    ${item.is_read ? '' : '<span class="notification-dot" aria-label="Unread"></span>'}
                    ${item.is_read ? '' : `<button class="btn btn-sm btn-outline" data-action="read" data-id="${escapeHtml(item.id)}"><i class="fas fa-check"></i></button>`}
                    <button class="btn btn-sm btn-outline" data-action="delete" data-id="${escapeHtml(item.id)}"><i class="fas fa-trash"></i></button>
                </div>
            </article>
        `).join('');
    }

    async function loadNotifications() {
        const root = document.getElementById('employee-notifications-list');
        if (root) {
            root.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <h3>Refreshing notifications...</h3>
                    <p class="empty-subtext">Please wait a moment.</p>
                </div>
            `;
        }

        try {
            const response = await fetch('/api/employee/notifications', { cache: 'no-store' });
            if (!response.ok) {
                throw new Error('Failed to load notifications');
            }
            state.items = await response.json();
            render();
        } catch (error) {
            console.error(error);
            if (root) {
                root.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-triangle-exclamation"></i>
                        <h3>Unable to load notifications</h3>
                        <p class="empty-subtext">Try refreshing again in a moment.</p>
                    </div>
                `;
            }
            showMessage('Unable to load notifications', 'error');
        }
    }

    async function markAllRead() {
        try {
            const response = await fetch('/api/employee/notifications/read-all', { method: 'POST' });
            if (!response.ok) throw new Error('Failed to update notifications');
            await loadNotifications();
            showMessage('All notifications marked as read', 'success');
        } catch (error) {
            console.error(error);
            showMessage('Unable to mark notifications as read', 'error');
        }
    }

    async function markRead(notificationId) {
        try {
            const response = await fetch(`/api/employee/notifications/${encodeURIComponent(notificationId)}/read`, {
                method: 'POST'
            });
            if (!response.ok) throw new Error('Failed to update notification');
            state.items = state.items.map((item) => (
                String(item.id) === String(notificationId) ? { ...item, is_read: true } : item
            ));
            render();
        } catch (error) {
            console.error(error);
            showMessage('Unable to update notification', 'error');
        }
    }

    async function deleteNotification(notificationId) {
        try {
            const response = await fetch(`/api/employee/notifications/${encodeURIComponent(notificationId)}`, {
                method: 'DELETE'
            });
            if (!response.ok) throw new Error('Failed to delete notification');
            state.items = state.items.filter((item) => String(item.id) !== String(notificationId));
            render();
            showMessage('Notification removed', 'success');
        } catch (error) {
            console.error(error);
            showMessage('Unable to delete notification', 'error');
        }
    }

    document.addEventListener('click', function (event) {
        const filterButton = event.target.closest('.filter-btn');
        if (filterButton) {
            state.filter = filterButton.dataset.filter || 'all';
            document.querySelectorAll('.filter-btn').forEach((button) => {
                button.classList.toggle('active', button === filterButton);
            });
            render();
            return;
        }

        const actionButton = event.target.closest('[data-action]');
        if (!actionButton) return;

        const notificationId = actionButton.dataset.id;
        const action = actionButton.dataset.action;
        if (action === 'read') {
            markRead(notificationId);
        } else if (action === 'delete') {
            deleteNotification(notificationId);
        }
    });

    document.getElementById('employee-notification-refresh')?.addEventListener('click', loadNotifications);
    document.getElementById('employee-mark-all-read')?.addEventListener('click', markAllRead);

    loadNotifications();
})();
</script>
