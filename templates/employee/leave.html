<div class="leave-management">
  <div class="leave-content">
    <!-- Statistics Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon pending">
          <i class="fas fa-clock"></i>
        </div>
        <div class="stat-content">
          <div class="stat-value" id="st-pending">0</div>
          <div class="stat-label">Pending</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon approved">
          <i class="fas fa-check-circle"></i>
        </div>
        <div class="stat-content">
          <div class="stat-value" id="st-approved">0</div>
          <div class="stat-label">Approved</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon rejected">
          <i class="fas fa-times-circle"></i>
        </div>
        <div class="stat-content">
          <div class="stat-value" id="st-rejected">0</div>
          <div class="stat-label">Rejected</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon total">
          <i class="fas fa-list-ul"></i>
        </div>
        <div class="stat-content">
          <div class="stat-value" id="st-total">0</div>
          <div class="stat-label">Total</div>
        </div>
      </div>
    </div>

    <!-- Main Content Grid -->
    <div class="main-grid">
      <!-- Calendar Section -->
      <div class="calendar-section">
        <div class="section-header">
          <h3>My Leave Calendar</h3>
          <div class="calendar-actions">
            <button class="calendar-nav-btn prev" id="cal-prev" aria-label="Previous Month"><i class="fas fa-chevron-left"></i></button>
            <div class="calendar-title" id="cal-title">Month YYYY</div>
            <button class="calendar-nav-btn next" id="cal-next" aria-label="Next Month"><i class="fas fa-chevron-right"></i></button>
          </div>
        </div>
        <div class="calendar-container">
          <div class="calendar-weekdays">
            <div class="weekday">Su</div>
            <div class="weekday">Mo</div>
            <div class="weekday">Tu</div>
            <div class="weekday">We</div>
            <div class="weekday">Th</div>
            <div class="weekday">Fr</div>
            <div class="weekday">Sa</div>
          </div>
          <div class="calendar-days" id="calendar-days"></div>
        </div>
        <div class="calendar-legend">
          <div class="legend-item"><div class="legend-color today"></div><span>Today</span></div>
          <div class="legend-item"><div class="legend-color approved"></div><span>Approved Leave</span></div>
          <div class="legend-item"><div class="legend-color pending"></div><span>Pending Approval</span></div>
          <div class="legend-item"><div class="legend-color rejected"></div><span>Rejected Leave</span></div>
        </div>
      </div>

      <!-- Requests Section -->
      <div class="requests-section">
        <div class="section-header">
          <h3>My Leave Requests</h3>
          <div class="section-actions">
            <button class="filter-btn active" id="btn-all">All</button>
            <button class="filter-btn" id="btn-pending">Pending</button>
            <button class="btn-primary" id="btn-new-request"><i class="fas fa-plus"></i> New Leave Request</button>
          </div>
        </div>
        <div class="requests-container" id="requests-container">
            <div class="empty-state" id="empty-state">
            <i class="fas fa-inbox"></i>
            <h4>No leave requests found</h4>
            <p>Create your first request to get started.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="leave-modal" style="display:none;">
    <div class="modal modal-lg" role="dialog" aria-modal="true" aria-labelledby="leave-modal-title">
      <div class="modal-header">
        <div>
          <h3 id="leave-modal-title">New Leave Request</h3>
          <p class="modal-subtitle">Submit leave details for manager approval.</p>
        </div>
        <button class="modal-close" id="close-leave-modal" type="button" aria-label="Close">&times;</button>
      </div>
      <form id="leave-request-form">
        <div class="modal-body">
          <div class="form-group">
            <label for="leave-type">Leave Type</label>
            <select id="leave-type" class="form-input" required>
              <option value="">Select leave type</option>
              <option value="vacation">Vacation</option>
              <option value="sick">Sick</option>
              <option value="personal">Personal</option>
              <option value="emergency">Emergency</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="start-date">Start Date</label>
            <input type="date" id="start-date" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="end-date">End Date</label>
            <input type="date" id="end-date" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="leave-reason">Reason</label>
            <textarea id="leave-reason" class="form-input" rows="4" placeholder="Please provide a detailed reason..." required></textarea>
          </div>
        </div>
        <div class="modal-footer" style="justify-content:flex-end;">
          <button type="button" class="filter-btn" id="cancel-leave-request">Cancel</button>
          <button type="submit" class="btn-primary">Submit Request</button>
        </div>
      </form>
    </div>
  </div>
</div>

<style>

<script>
(() => {
  const root = document.querySelector('.leave-management');
  if (!root) return;

  const state = {
    leaves: [],
    filter: (() => {
      const q = new URLSearchParams(window.location.search).get('filter');
      return q === 'pending' ? 'pending' : 'all';
    })(),
    month: new Date().getMonth(),
    year: new Date().getFullYear()
  };

  const refs = {
    stPending: root.querySelector('#st-pending'),
    stApproved: root.querySelector('#st-approved'),
    stRejected: root.querySelector('#st-rejected'),
    stTotal: root.querySelector('#st-total'),
    calTitle: root.querySelector('#cal-title'),
    calDays: root.querySelector('#calendar-days'),
    requests: root.querySelector('#requests-container'),
    btnAll: root.querySelector('#btn-all'),
    btnPending: root.querySelector('#btn-pending'),
    btnPrev: root.querySelector('#cal-prev'),
    btnNext: root.querySelector('#cal-next'),
    btnNew: root.querySelector('#btn-new-request'),
    modal: root.querySelector('#leave-modal'),
    closeModal: root.querySelector('#close-leave-modal'),
    cancelModal: root.querySelector('#cancel-leave-request'),
    form: root.querySelector('#leave-request-form'),
    type: root.querySelector('#leave-type'),
    start: root.querySelector('#start-date'),
    end: root.querySelector('#end-date'),
    reason: root.querySelector('#leave-reason')
  };

  function notify(message, type = 'info') {
    if (window.showNotification) {
      window.showNotification(message, type);
      return;
    }
    alert(message);
  }

  function esc(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function toDate(value) {
    const raw = String(value || '').slice(0, 10);
    const d = new Date(raw + 'T00:00:00');
    return Number.isNaN(d.getTime()) ? null : d;
  }

  function toKey(dateObj) {
    const y = dateObj.getFullYear();
    const m = String(dateObj.getMonth() + 1).padStart(2, '0');
    const d = String(dateObj.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function monthLabel(month, year) {
    return new Date(year, month, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }

  function openModal() {
    if (!refs.modal) return;
    refs.modal.style.display = 'flex';
    const today = new Date().toISOString().slice(0, 10);
    if (refs.start) refs.start.min = today;
    if (refs.end) refs.end.min = refs.start && refs.start.value ? refs.start.value : today;
  }

  function closeModal() {
    if (!refs.modal) return;
    refs.modal.style.display = 'none';
    refs.form && refs.form.reset();
  }

  function syncFilterButtons() {
    if (refs.btnAll) refs.btnAll.classList.toggle('active', state.filter !== 'pending');
    if (refs.btnPending) refs.btnPending.classList.toggle('active', state.filter === 'pending');
  }

  function renderStats() {
    const pending = state.leaves.filter(l => String(l.status || '').toLowerCase() === 'pending').length;
    const approved = state.leaves.filter(l => String(l.status || '').toLowerCase() === 'approved').length;
    const rejected = state.leaves.filter(l => String(l.status || '').toLowerCase() === 'rejected').length;
    if (refs.stPending) refs.stPending.textContent = String(pending);
    if (refs.stApproved) refs.stApproved.textContent = String(approved);
    if (refs.stRejected) refs.stRejected.textContent = String(rejected);
    if (refs.stTotal) refs.stTotal.textContent = String(state.leaves.length);
  }

  function dayStatus(day) {
    const key = toKey(day);
    let status = '';
    for (const leave of state.leaves) {
      const start = toDate(leave.start_date || leave.startDate);
      const end = toDate(leave.end_date || leave.endDate);
      if (!start || !end) continue;
      const t = new Date(key + 'T00:00:00').getTime();
      if (t < start.getTime() || t > end.getTime()) continue;
      const leaveStatus = String(leave.status || '').toLowerCase();
      if (leaveStatus === 'approved') return 'approved';
      if (leaveStatus === 'pending' && status !== 'approved') status = 'pending';
      if (leaveStatus === 'rejected' && !status) status = 'rejected';
    }
    return status;
  }

  function renderCalendar() {
    if (!refs.calTitle || !refs.calDays) return;
    refs.calTitle.textContent = monthLabel(state.month, state.year);
    refs.calDays.innerHTML = '';
    const todayKey = toKey(new Date());

    const first = new Date(state.year, state.month, 1);
    const startWeekday = first.getDay();
    const daysInMonth = new Date(state.year, state.month + 1, 0).getDate();
    const daysInPrev = new Date(state.year, state.month, 0).getDate();

    for (let i = 0; i < startWeekday; i++) {
      const day = document.createElement('div');
      day.className = 'calendar-day other-month';
      day.textContent = String(daysInPrev - startWeekday + i + 1);
      refs.calDays.appendChild(day);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateObj = new Date(state.year, state.month, d);
      const status = dayStatus(dateObj);
      const key = toKey(dateObj);
      const isToday = key === todayKey;
      const day = document.createElement('div');
      day.className = `calendar-day${status ? ' ' + status : ''}${isToday ? ' today' : ''}`;
      day.textContent = String(d);
      refs.calDays.appendChild(day);
    }

    const filled = startWeekday + daysInMonth;
    const tail = (7 - (filled % 7)) % 7;
    for (let i = 1; i <= tail; i++) {
      const day = document.createElement('div');
      day.className = 'calendar-day other-month';
      day.textContent = String(i);
      refs.calDays.appendChild(day);
    }
  }

  function renderRequests() {
    if (!refs.requests) return;
    syncFilterButtons();
    let list = state.leaves.slice();
    if (state.filter === 'pending') {
      list = list.filter(l => String(l.status || '').toLowerCase() === 'pending');
    }

    list.sort((a, b) => String(b.applied_at || '').localeCompare(String(a.applied_at || '')));

    if (!list.length) {
      refs.requests.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-inbox"></i>
          <h4>No leave requests found</h4>
          <p>Create your first request to get started.</p>
        </div>
      `;
      return;
    }

    refs.requests.innerHTML = list.map(leave => {
      const status = String(leave.status || 'pending').toLowerCase();
      const type = String(leave.type || 'leave').replace('-', ' ');
      const start = String(leave.start_date || leave.startDate || '').slice(0, 10);
      const end = String(leave.end_date || leave.endDate || '').slice(0, 10);
      return `
        <article class="request-item">
          <div class="request-header">
            <span class="request-type ${esc(status)}">${esc(status)}</span>
            <span class="request-dates">${esc(start)} to ${esc(end)}</span>
          </div>
          <div class="request-meta">Type: ${esc(type)}</div>
          <p class="request-reason">${esc(leave.reason || 'No reason provided')}</p>
        </article>
      `;
    }).join('');
  }

  async function loadLeaves() {
    try {
      const response = await fetch('/api/employee/leave');
      if (!response.ok) throw new Error('Failed to load leave data');
      state.leaves = await response.json();
      renderStats();
      renderCalendar();
      renderRequests();
    } catch (error) {
      console.error(error);
      state.leaves = [];
      renderStats();
      renderCalendar();
      renderRequests();
      notify('Failed to load leave data', 'error');
    }
  }

  async function submitLeave(event) {
    event.preventDefault();
    const payload = {
      type: refs.type ? refs.type.value : '',
      startDate: refs.start ? refs.start.value : '',
      endDate: refs.end ? refs.end.value : '',
      reason: refs.reason ? refs.reason.value.trim() : ''
    };

    if (!payload.type || !payload.startDate || !payload.endDate || !payload.reason) {
      notify('Please fill all fields', 'error');
      return;
    }
    if (payload.endDate < payload.startDate) {
      notify('End date must be on or after start date', 'error');
      return;
    }

    try {
      const response = await fetch('/api/employee/leave-request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!response.ok) throw new Error('Failed to submit leave request');
      notify('Leave request submitted successfully', 'success');
      closeModal();
      await loadLeaves();
    } catch (error) {
      console.error(error);
      notify('Failed to submit leave request', 'error');
    }
  }

  refs.btnPrev && refs.btnPrev.addEventListener('click', () => {
    state.month -= 1;
    if (state.month < 0) {
      state.month = 11;
      state.year -= 1;
    }
    renderCalendar();
  });

  refs.btnNext && refs.btnNext.addEventListener('click', () => {
    state.month += 1;
    if (state.month > 11) {
      state.month = 0;
      state.year += 1;
    }
    renderCalendar();
  });

  refs.btnAll && refs.btnAll.addEventListener('click', () => {
    state.filter = 'all';
    refs.btnAll.classList.add('active');
    refs.btnPending && refs.btnPending.classList.remove('active');
    renderRequests();
  });

  refs.btnPending && refs.btnPending.addEventListener('click', () => {
    state.filter = 'pending';
    refs.btnPending.classList.add('active');
    refs.btnAll && refs.btnAll.classList.remove('active');
    renderRequests();
  });

  refs.btnNew && refs.btnNew.addEventListener('click', openModal);
  refs.closeModal && refs.closeModal.addEventListener('click', closeModal);
  refs.cancelModal && refs.cancelModal.addEventListener('click', closeModal);
  refs.form && refs.form.addEventListener('submit', submitLeave);

  refs.modal && refs.modal.addEventListener('click', (e) => {
    if (e.target === refs.modal) closeModal();
  });

  refs.start && refs.start.addEventListener('change', () => {
    if (!refs.end) return;
    refs.end.min = refs.start.value || '';
    if (refs.end.value && refs.start.value && refs.end.value < refs.start.value) {
      refs.end.value = refs.start.value;
    }
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadLeaves, { once: true });
  } else {
    loadLeaves();
  }
})();
</script>
