<!-- Employee Projects View - Redesigned -->
<div class="projects-view">
    <!-- Page Header -->
    <div class="page-header">
        <h1 class="page-title">My Projects</h1>
        <p class="page-subtitle">Track progress on your assigned projects</p>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" id="total-projects">0</div>
            <div class="stat-label">Total Projects</div>
            <div class="stat-icon">
                <i class="fas fa-bullseye"></i>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="active-tasks">0</div>
            <div class="stat-label">Active Tasks</div>
            <div class="stat-icon">
                <i class="fas fa-clock"></i>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="completed-tasks">0</div>
            <div class="stat-label">Completed Tasks</div>
            <div class="stat-icon">
                <i class="fas fa-users"></i>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="avg-progress">0%</div>
            <div class="stat-label">Avg. Progress</div>
            <div class="stat-icon">
                <i class="fas fa-calendar-alt"></i>
            </div>
        </div>
    </div>

    <!-- Projects List -->
    <div class="projects-list" id="projects-list">
        <!-- Projects will be loaded dynamically -->
    </div>
</div>

<script>
let projectsData = [];
let tasksData = [];

// Run immediately if DOM is already loaded (server-side include), otherwise on DOMContentLoaded
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { loadProjectsData(); });
} else {
    loadProjectsData();
}

async function loadProjectsData() {
    try {
        const [projectsRes, tasksRes] = await Promise.all([
            fetch('/api/employee/projects', { credentials: 'same-origin' }),
            fetch('/api/employee/tasks', { credentials: 'same-origin' })
        ]);
        
        if (projectsRes.ok) projectsData = await projectsRes.json(); else console.warn('projects fetch failed', projectsRes.status);
        if (tasksRes.ok) tasksData = await tasksRes.json(); else console.warn('tasks fetch failed', tasksRes.status);
        
        console.debug('projects loaded', { projects: projectsData.length, tasks: tasksData.length });
        updateStats();
        renderProjects();
    } catch (error) {
        console.error('Error loading projects:', error);
    }
}

function updateStats() {
    const totalProjects = projectsData.length;
    const activeTasks = tasksData.filter(t => (t.status||'').toLowerCase() === 'in-progress').length;
    const completedTasks = tasksData.filter(t => (t.status||'').toLowerCase() === 'completed').length;
    const avgProgress = totalProjects > 0 ? Math.round(projectsData.reduce((sum, p) => sum + (parseInt(p.progress) || 0), 0) / totalProjects) : 0;
    
    document.getElementById('total-projects').textContent = totalProjects;
    document.getElementById('active-tasks').textContent = activeTasks;
    document.getElementById('completed-tasks').textContent = completedTasks;
    document.getElementById('avg-progress').textContent = avgProgress + '%';
}

function renderProjects() {
    const container = document.getElementById('projects-list');
    if (!container) { console.error('projects-list container missing'); return; }
    
    if (!projectsData || projectsData.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-project-diagram"></i><p>No projects found</p></div>';
        return;
    }
    
    container.innerHTML = projectsData.map(project => {
        const projectTasks = tasksData.filter(t => String(t.project_id) === String(project.id));
        const completedCount = projectTasks.filter(t => (t.status||'').toLowerCase() === 'completed').length;
        const totalCount = projectTasks.length;
        const teamSize = project.teamMembers ? project.teamMembers.length : 0;
        const progress = parseInt(project.progress) || 0;
        const status = (project.status || 'planning').toLowerCase();
        const deadline = project.deadline || project.end_date || project.endDate || 'N/A';
        
        return `
            <div class="project-card" data-project-id="${project.id}">
                <div class="project-header">
                    <button class="collapse-btn" onclick="toggleProject(this)">
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="project-info">
                        <h3 class="project-title">${project.name || 'Untitled Project'}</h3>
                        <p class="project-desc">${project.description || 'No description'}</p>
                    </div>
                    <div class="project-badges">
                        <span class="status-badge ${status}">${status}</span>
                        ${deadline !== 'N/A' && new Date(deadline) < new Date() ? '<span class="overdue-badge">Overdue</span>' : ''}
                    </div>
                    <button class="view-details-btn" onclick="openProjectDetails('${project.id}')">
                        <i class="fas fa-eye"></i> View Details
                    </button>
                </div>
                
                <div class="project-progress">
                    <span class="progress-label">Overall Progress</span>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" style="width: ${progress}%"></div>
                    </div>
                    <span class="progress-percent">${progress}%</span>
                </div>
                
                <div class="project-details">
                    <div class="project-stats">
                        <div class="stat-box">
                            <div class="stat-label">Tasks</div>
                            <div class="stat-value">${completedCount}/${totalCount}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Team Size</div>
                            <div class="stat-value">${teamSize}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Deadline</div>
                            <div class="stat-value">${deadline !== 'N/A' ? new Date(deadline).toLocaleDateString() : 'N/A'}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Hours</div>
                            <div class="stat-value">0/2h</div>
                        </div>
                    </div>
                    
                    ${projectTasks.length > 0 ? `
                        <div class="project-tasks">
                            <h4 class="tasks-title">Project Tasks</h4>
                            ${projectTasks.map(task => `
                                <div class="task-item">
                                    <span class="task-name">${task.title || task.name || 'Untitled Task'}</span>
                                    <span class="task-assignee">${task.assigned_by || 'Unassigned'}</span>
                                    <span class="task-status-badge ${(task.status||'pending').toLowerCase()}">${task.status || 'pending'}</span>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            </div>
        `;
    }).join('');
}

function toggleProject(btn) {
    const card = btn.closest('.project-card');
    const details = card.querySelector('.project-details');
    const icon = btn.querySelector('i');
    
    if (details.style.display === 'none' || !details.style.display) {
        details.style.display = 'block';
        icon.style.transform = 'rotate(180deg)';
    } else {
        details.style.display = 'none';
        icon.style.transform = 'rotate(0deg)';
    }
}

function openProjectDetails(projectId) {
    const project = projectsData.find(p => String(p.id) === String(projectId));
    if (!project) return;
    
    const projectTasks = tasksData.filter(t => String(t.project_id) === String(projectId));
    const completed = projectTasks.filter(t => (t.status||'').toLowerCase() === 'completed').length;
    const inProgress = projectTasks.filter(t => (t.status||'').toLowerCase() === 'in-progress').length;
    const pending = projectTasks.filter(t => (t.status||'').toLowerCase() === 'pending').length;
    const overdue = projectTasks.filter(t => t.deadline && new Date(t.deadline) < new Date()).length;
    
    const modal = document.createElement('div');
    modal.className = 'project-modal-overlay';
    modal.innerHTML = `
        <div class="project-modal">
            <div class="modal-header">
                <h2>${project.name} - Detailed Statistics</h2>
                <button class="modal-close" onclick="this.closest('.project-modal-overlay').remove()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="modal-section">
                    <h3><i class="fas fa-chart-bar"></i> Project Overview</h3>
                    <div class="overview-grid">
                        <div class="overview-card">
                            <div class="overview-number">${projectTasks.length}</div>
                            <div class="overview-label">Total Tasks</div>
                        </div>
                        <div class="overview-card">
                            <div class="overview-number">1h</div>
                            <div class="overview-label">Hours Completed</div>
                        </div>
                        <div class="overview-card">
                            <div class="overview-number">1h</div>
                            <div class="overview-label">Total Hours</div>
                        </div>
                        <div class="overview-card">
                            <div class="overview-number">100%</div>
                            <div class="overview-label">Hours Progress</div>
                        </div>
                    </div>
                </div>
                
                <div class="modal-section">
                    <h3><i class="fas fa-tasks"></i> Task Distribution</h3>
                    <div class="distribution-grid">
                        <div class="dist-card">
                            <div class="dist-number" style="color:#10b981">${completed}</div>
                            <div class="dist-label">Completed</div>
                        </div>
                        <div class="dist-card">
                            <div class="dist-number" style="color:#3b82f6">${inProgress}</div>
                            <div class="dist-label">In Progress</div>
                        </div>
                        <div class="dist-card">
                            <div class="dist-number" style="color:#f59e0b">${pending}</div>
                            <div class="dist-label">Pending</div>
                        </div>
                        <div class="dist-card">
                            <div class="dist-number" style="color:#ef4444">${overdue}</div>
                            <div class="dist-label">Overdue</div>
                        </div>
                    </div>
                </div>
                
                <div class="modal-section">
                    <h3><i class="fas fa-users"></i> Team Contributions</h3>
                    <p style="text-align:center;color:#64748b;padding:2rem;">No team member data available</p>
                </div>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
}

function showNotification(message, type = 'info') {
    console.log(`${type}: ${message}`);
}
</script>
