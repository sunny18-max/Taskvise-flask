<div class="mgr-leave">
  <div class="mgr-leave-content">
    <div class="mgr-leave-stats">
      <article class="mgr-leave-stat-card">
        <div class="mgr-leave-stat-icon pending"><i class="fas fa-clock"></i></div>
        <div>
          <div class="mgr-leave-stat-value" id="mgr-leave-st-pending">0</div>
          <div class="mgr-leave-stat-label">Pending</div>
        </div>
      </article>
      <article class="mgr-leave-stat-card">
        <div class="mgr-leave-stat-icon approved"><i class="fas fa-check-circle"></i></div>
        <div>
          <div class="mgr-leave-stat-value" id="mgr-leave-st-approved">0</div>
          <div class="mgr-leave-stat-label">Approved</div>
        </div>
      </article>
      <article class="mgr-leave-stat-card">
        <div class="mgr-leave-stat-icon rejected"><i class="fas fa-times-circle"></i></div>
        <div>
          <div class="mgr-leave-stat-value" id="mgr-leave-st-rejected">0</div>
          <div class="mgr-leave-stat-label">Rejected</div>
        </div>
      </article>
      <article class="mgr-leave-stat-card">
        <div class="mgr-leave-stat-icon total"><i class="fas fa-users"></i></div>
        <div>
          <div class="mgr-leave-stat-value" id="mgr-leave-st-total">0</div>
          <div class="mgr-leave-stat-label">Total</div>
        </div>
      </article>
    </div>

    <section class="mgr-leave-card mgr-availability-card">
      <header class="mgr-leave-card-header">
        <h3>{{ 'Workforce Availability Today' if role == 'hr' else 'Team Availability Today' }}</h3>
        <span class="mgr-availability-date" id="mgr-availability-date"></span>
      </header>
      <div class="mgr-availability-grid">
        <div class="mgr-availability-panel on-leave">
          <div class="mgr-availability-panel-head">
            <h4>On Leave</h4>
            <span class="mgr-availability-count" id="mgr-on-leave-count">0</span>
          </div>
          <div class="mgr-availability-list" id="mgr-on-leave-list"></div>
        </div>
        <div class="mgr-availability-panel working">
          <div class="mgr-availability-panel-head">
            <h4>Working</h4>
            <span class="mgr-availability-count" id="mgr-working-count">0</span>
          </div>
          <div class="mgr-availability-list" id="mgr-working-list"></div>
        </div>
      </div>
    </section>

    <div class="mgr-leave-grid">
      <section class="mgr-leave-card mgr-leave-calendar-card">
        <header class="mgr-leave-card-header">
          <h3>{{ 'Leave Calendar' if role == 'hr' else 'Team Leave Calendar' }}</h3>
          <div class="mgr-leave-calendar-actions">
            <button class="mgr-calendar-nav prev" type="button" aria-label="Previous month">
              <i class="fas fa-chevron-left"></i>
            </button>
            <div class="mgr-leave-calendar-title" id="mgr-leave-cal-title">Month YYYY</div>
            <button class="mgr-calendar-nav next" type="button" aria-label="Next month">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>
        </header>

        <div class="mgr-leave-calendar-body">
          <div class="mgr-leave-weekdays">
            <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
          </div>
          <div class="mgr-leave-days" id="mgr-leave-calendar-days"></div>
        </div>

        <footer class="mgr-leave-legend">
          <div class="mgr-leave-legend-item"><span class="mgr-leave-dot today"></span>Today</div>
          <div class="mgr-leave-legend-item"><span class="mgr-leave-dot approved"></span>Approved</div>
          <div class="mgr-leave-legend-item"><span class="mgr-leave-dot pending"></span>Pending</div>
          <div class="mgr-leave-legend-item"><span class="mgr-leave-dot rejected"></span>Rejected</div>
        </footer>
      </section>

      <section class="mgr-leave-card mgr-leave-requests-card">
        <header class="mgr-leave-card-header">
          <h3>Leave Requests</h3>
          <div class="mgr-leave-filter-tabs">
            <button class="mgr-leave-filter" id="mgr-leave-filter-pending" data-filter="pending" type="button">Pending</button>
            <button class="mgr-leave-filter" id="mgr-leave-filter-approved" data-filter="approved" type="button">Approved</button>
            <button class="mgr-leave-filter" id="mgr-leave-filter-all" data-filter="all" type="button">All Requests</button>
          </div>
        </header>
        <div class="mgr-leave-requests" id="mgr-leave-requests"></div>
      </section>
    </div>
  </div>
</div>

<script>
(() => {
  const root = document.querySelector('.mgr-leave');
  if (!root) return;

  const state = {
    month: new Date().getMonth(),
    year: new Date().getFullYear(),
    leaves: [],
    filter: (() => {
      const q = new URLSearchParams(window.location.search).get('filter');
      if (q === 'pending' || q === 'approved' || q === 'rejected' || q === 'all') return q;
      return 'pending';
    })(),
    employeesById: {},
    onLeaveToday: [],
    workingToday: []
  };

  const refs = {
    stPending: root.querySelector('#mgr-leave-st-pending'),
    stApproved: root.querySelector('#mgr-leave-st-approved'),
    stRejected: root.querySelector('#mgr-leave-st-rejected'),
    stTotal: root.querySelector('#mgr-leave-st-total'),
    calTitle: root.querySelector('#mgr-leave-cal-title'),
    calDays: root.querySelector('#mgr-leave-calendar-days'),
    requests: root.querySelector('#mgr-leave-requests'),
    availabilityDate: root.querySelector('#mgr-availability-date'),
    onLeaveCount: root.querySelector('#mgr-on-leave-count'),
    onLeaveList: root.querySelector('#mgr-on-leave-list'),
    workingCount: root.querySelector('#mgr-working-count'),
    workingList: root.querySelector('#mgr-working-list')
  };

  function notify(message, type = 'info') {
    if (window.managerDashboard && typeof window.managerDashboard.showNotification === 'function') {
      window.managerDashboard.showNotification(message, type);
      return;
    }
    alert(message);
  }

  function esc(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function toDate(value) {
    const raw = String(value || '').slice(0, 10);
    const d = new Date(raw + 'T00:00:00');
    return Number.isNaN(d.getTime()) ? null : d;
  }

  function toKey(dateObj) {
    const y = dateObj.getFullYear();
    const m = String(dateObj.getMonth() + 1).padStart(2, '0');
    const d = String(dateObj.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function monthLabel(month, year) {
    return new Date(year, month, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }

  function normalizeStatus(value) {
    const raw = String(value || '').trim().toLowerCase();
    if (!raw) return 'pending';
    if (raw === 'approve' || raw === 'accepted') return 'approved';
    if (raw === 'reject' || raw === 'denied') return 'rejected';
    if (raw === 'pending approval' || raw === 'awaiting approval') return 'pending';
    return raw;
  }

  function getDayStatus(day) {
    const key = toKey(day);
    let status = '';

    for (const leave of state.leaves) {
      const start = toDate(leave.start_date || leave.startDate);
      const end = toDate(leave.end_date || leave.endDate);
      if (!start || !end) continue;
      const dayTime = new Date(key + 'T00:00:00').getTime();
      if (dayTime < start.getTime() || dayTime > end.getTime()) continue;

      const leaveStatus = normalizeStatus(leave.status);
      if (leaveStatus === 'approved') return 'approved';
      if (leaveStatus === 'pending' && status !== 'approved') status = 'pending';
      if (leaveStatus === 'rejected' && !status) status = 'rejected';
    }

    return status;
  }

  function renderCalendar() {
    if (!refs.calDays || !refs.calTitle) return;

    refs.calTitle.textContent = monthLabel(state.month, state.year);
    refs.calDays.innerHTML = '';
    const todayKey = toKey(new Date());

    const firstDay = new Date(state.year, state.month, 1);
    const startWeekday = firstDay.getDay();
    const daysInMonth = new Date(state.year, state.month + 1, 0).getDate();
    const daysInPrev = new Date(state.year, state.month, 0).getDate();

    for (let i = 0; i < startWeekday; i++) {
      const day = document.createElement('div');
      day.className = 'mgr-leave-day muted';
      day.textContent = String(daysInPrev - startWeekday + i + 1);
      refs.calDays.appendChild(day);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateObj = new Date(state.year, state.month, d);
      const status = getDayStatus(dateObj);
      const dayKey = toKey(dateObj);
      const isToday = dayKey === todayKey;
      const day = document.createElement('div');
      day.className = `mgr-leave-day${status ? ' ' + status : ''}${isToday ? ' today' : ''}`;
      day.textContent = String(d);
      refs.calDays.appendChild(day);
    }

    const filled = startWeekday + daysInMonth;
    const tail = (7 - (filled % 7)) % 7;
    for (let i = 1; i <= tail; i++) {
      const day = document.createElement('div');
      day.className = 'mgr-leave-day muted';
      day.textContent = String(i);
      refs.calDays.appendChild(day);
    }
  }

  function renderStats() {
    const pending = state.leaves.filter(l => normalizeStatus(l.status) === 'pending').length;
    const approved = state.leaves.filter(l => normalizeStatus(l.status) === 'approved').length;
    const rejected = state.leaves.filter(l => normalizeStatus(l.status) === 'rejected').length;

    if (refs.stPending) refs.stPending.textContent = String(pending);
    if (refs.stApproved) refs.stApproved.textContent = String(approved);
    if (refs.stRejected) refs.stRejected.textContent = String(rejected);
    if (refs.stTotal) refs.stTotal.textContent = String(state.leaves.length);
  }

  function employeeNameById(id) {
    const emp = state.employeesById[String(id)] || {};
    return emp.name || emp.fullName || 'Employee';
  }

  function toLocalDate(dateObj) {
    return new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
  }

  function computeTodayAvailability() {
    const today = toLocalDate(new Date());
    const onLeaveMap = new Map();

    state.leaves.forEach((leave) => {
      if (normalizeStatus(leave.status) !== 'approved') return;
      const start = toDate(leave.start_date || leave.startDate);
      const end = toDate(leave.end_date || leave.endDate);
      if (!start || !end) return;
      if (today < start || today > end) return;

      const employeeId = String(leave.employee_id || '');
      const name = employeeNameById(employeeId);
      if (!onLeaveMap.has(employeeId)) {
        onLeaveMap.set(employeeId, {
          id: employeeId,
          name,
          type: String(leave.type || 'leave').replace('-', ' ')
        });
      }
    });

    const allEmployees = Object.values(state.employeesById).map(emp => ({
      id: String(emp.id || ''),
      name: emp.name || emp.fullName || 'Employee'
    }));

    allEmployees.sort((a, b) => a.name.localeCompare(b.name));

    state.onLeaveToday = Array.from(onLeaveMap.values()).sort((a, b) => a.name.localeCompare(b.name));
    const onLeaveIds = new Set(state.onLeaveToday.map(emp => emp.id));
    state.workingToday = allEmployees.filter(emp => !onLeaveIds.has(emp.id));
  }

  function renderAvailability() {
    if (refs.availabilityDate) {
      refs.availabilityDate.textContent = new Date().toLocaleDateString('en-US', {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
    }

    if (refs.onLeaveCount) refs.onLeaveCount.textContent = String(state.onLeaveToday.length);
    if (refs.workingCount) refs.workingCount.textContent = String(state.workingToday.length);

    if (refs.onLeaveList) {
      refs.onLeaveList.innerHTML = state.onLeaveToday.length
        ? state.onLeaveToday.map(emp => `
            <div class="mgr-availability-item">
              <span>${esc(emp.name)}</span>
              <small>${esc(emp.type)}</small>
            </div>
          `).join('')
        : '<div class="mgr-availability-empty">No one is on approved leave today.</div>';
    }

    if (refs.workingList) {
      refs.workingList.innerHTML = state.workingToday.length
        ? state.workingToday.map(emp => `
            <div class="mgr-availability-item">
              <span>${esc(emp.name)}</span>
              <small>Available</small>
            </div>
          `).join('')
        : '<div class="mgr-availability-empty">No active team members found.</div>';
    }
  }

  function syncFilterButtons() {
    root.querySelectorAll('.mgr-leave-filter').forEach(btn => {
      const value = btn.getAttribute('data-filter');
      const isAllActive = value === 'all' && !['pending', 'approved'].includes(state.filter);
      btn.classList.toggle('active', value === state.filter || isAllActive);
    });
  }

  function renderRequests() {
    if (!refs.requests) return;
    syncFilterButtons();

    let list = state.leaves.slice();
    if (state.filter !== 'all') {
      list = list.filter(l => normalizeStatus(l.status) === state.filter);
    }

    list.sort((a, b) => String(b.applied_at || '').localeCompare(String(a.applied_at || '')));

    if (!list.length) {
      const filterLabel = state.filter === 'all'
        ? ''
        : `${state.filter === 'rejected' ? 'rejected' : state.filter} `;
      refs.requests.innerHTML = `
        <div class="mgr-leave-empty">
          <i class="fas fa-inbox"></i>
          <h4>No ${filterLabel}leave requests</h4>
          <p>Requests will appear here once employees submit them.</p>
        </div>
      `;
      return;
    }

    refs.requests.innerHTML = list.map(leave => {
      const status = normalizeStatus(leave.status);
      const start = String(leave.start_date || leave.startDate || '').slice(0, 10);
      const end = String(leave.end_date || leave.endDate || '').slice(0, 10);
      let leaveType = String(leave.type || '').replace('-', ' ').trim();
      if (!leaveType) {
        const fallbackType = String(leave.status || '').trim().toLowerCase();
        if (!['pending', 'approved', 'rejected'].includes(fallbackType) && fallbackType) {
          leaveType = fallbackType;
        }
      }
      if (!leaveType) leaveType = 'leave';
      const allowActions = status === 'pending';

      return `
        <article class="mgr-leave-request-item">
          <div class="mgr-leave-request-head">
            <div>
              <h4>${esc(employeeNameById(leave.employee_id))}</h4>
              <p>${esc(start)} to ${esc(end)}</p>
            </div>
            <span class="mgr-leave-status ${esc(status)}">${esc(status)}</span>
          </div>
          <p class="mgr-leave-request-meta">Type: ${esc(leaveType)}</p>
          <p class="mgr-leave-request-reason">${esc(leave.reason || 'No reason provided')}</p>
          ${allowActions ? `
          <div class="mgr-leave-request-actions">
            <button class="mgr-leave-action approve" data-action="approve" data-id="${esc(leave.id)}" type="button">
              <i class="fas fa-check"></i> Approve
            </button>
            <button class="mgr-leave-action reject" data-action="rejected" data-id="${esc(leave.id)}" type="button">
              <i class="fas fa-times"></i> Reject
            </button>
          </div>
          ` : ''}
        </article>
      `;
    }).join('');
  }

  async function updateLeaveStatus(leaveId, status) {
    try {
      const response = await fetch('/api/manager/leave/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: leaveId, status })
      });
      if (!response.ok) throw new Error('Failed to update leave request');
      notify(`Leave request ${status}.`, 'success');
      await loadData();
    } catch (error) {
      console.error(error);
      notify('Failed to update leave request', 'error');
    }
  }

  async function loadData() {
    try {
      const [leaveRes, empRes] = await Promise.all([
        fetch('/api/manager/leave'),
        fetch('/api/manager/employees')
      ]);

      if (!leaveRes.ok) throw new Error('Failed to load leave data');
      state.leaves = await leaveRes.json();

      state.employeesById = {};
      if (empRes.ok) {
        const employees = await empRes.json();
        employees.forEach(emp => {
          state.employeesById[String(emp.id)] = emp;
        });
      }

      computeTodayAvailability();
      renderStats();
      renderAvailability();
      renderCalendar();
      renderRequests();
    } catch (error) {
      console.error(error);
      state.leaves = [];
      state.onLeaveToday = [];
      state.workingToday = [];
      renderStats();
      renderAvailability();
      renderCalendar();
      renderRequests();
      notify('Failed to load leave management data', 'error');
    }
  }

  root.addEventListener('click', (event) => {
    const navBtn = event.target.closest('.mgr-calendar-nav');
    if (navBtn) {
      if (navBtn.classList.contains('prev')) {
        state.month -= 1;
        if (state.month < 0) {
          state.month = 11;
          state.year -= 1;
        }
      } else {
        state.month += 1;
        if (state.month > 11) {
          state.month = 0;
          state.year += 1;
        }
      }
      renderCalendar();
      return;
    }

    const filterBtn = event.target.closest('.mgr-leave-filter');
    if (filterBtn) {
      root.querySelectorAll('.mgr-leave-filter').forEach(btn => btn.classList.remove('active'));
      filterBtn.classList.add('active');
      state.filter = filterBtn.getAttribute('data-filter') || 'all';
      renderRequests();
      return;
    }

    const actionBtn = event.target.closest('.mgr-leave-action');
    if (actionBtn) {
      const leaveId = actionBtn.getAttribute('data-id');
      const status = actionBtn.getAttribute('data-action');
      if (leaveId && status) {
        updateLeaveStatus(leaveId, status);
      }
    }
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadData, { once: true });
  } else {
    loadData();
  }
})();
</script>

<style>
