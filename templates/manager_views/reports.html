<div class="view-container">
    <!-- Reports Content -->
    <div class="reports-content">
        <div class="chart-card">
            <div class="chart-header">
                <h3 class="chart-title">{{ 'Workforce Performance Overview' if role == 'hr' else 'Team Performance Overview' if role == 'teamlead' else 'Employee Performance Overview' }}</h3>
                <div class="chart-actions">
                    <button class="btn btn-outline" onclick="exportReport()">
                        <i class="fas fa-download"></i>
                        Export
                    </button>
                    <button class="btn btn-outline" onclick="refreshData()">
                        <i class="fas fa-sync-alt"></i>
                        Refresh
                    </button>
                </div>
            </div>
            
            <div class="chart-container">
                <div id="performanceChart" class="chart"></div>
                <div id="chartTooltip" class="chart-tooltip"></div>
            </div>
            
            <div class="chart-legend">
                <div class="legend-item">
                    <div class="legend-color productivity"></div>
                    <span>Productivity %</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color completed-tasks"></div>
                    <span>Completed Tasks</span>
                </div>
            </div>
        </div>
        
        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number" id="avgProductivity">0%</div>
                    <div class="stat-label">Average Productivity</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-tasks"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number" id="totalTasks">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number" id="completionRate">0%</div>
                    <div class="stat-label">Completion Rate</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number" id="activeEmployees">0</div>
                    <div class="stat-label">Active Employees</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let employeePerformance = [];
let latestManagerAnalytics = null;

document.addEventListener('DOMContentLoaded', function() {
    loadReportsData();
    window.addEventListener('managerDataRefreshed', loadReportsData);
});

function normalizeReportTaskStatus(value) {
    const raw = String(value || '').trim().toLowerCase();
    if (raw === 'in_progress' || raw === 'in progress') return 'in-progress';
    if (raw === 'done') return 'completed';
    if (raw === 'todo' || raw === 'to do') return 'pending';
    return raw || 'pending';
}

function buildFallbackAnalytics() {
    const dashboardApi = window.managerDashboard || window.teamLeadDashboard;
    const employees = (dashboardApi && Array.isArray(dashboardApi.employees))
        ? dashboardApi.employees
        : [];
    const tasks = (dashboardApi && Array.isArray(dashboardApi.tasks))
        ? dashboardApi.tasks
        : [];

    const tasksByEmployee = new Map();
    tasks.forEach(task => {
        const assigneeId = String(task.assignee_id || task.assigneeId || task.assignedTo || '').trim();
        if (!tasksByEmployee.has(assigneeId)) {
            tasksByEmployee.set(assigneeId, []);
        }
        tasksByEmployee.get(assigneeId).push(task);
    });

    const performance = employees.map(emp => {
        const empTasks = tasksByEmployee.get(String(emp.id || '').trim()) || [];
        const completedTasks = empTasks.filter(t => normalizeReportTaskStatus(t.status) === 'completed').length;
        const totalTasks = empTasks.length;
        const completionRate = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
        const productivity = Number(emp.productivity || completionRate || 0);
        return {
            employee_id: emp.id,
            name: emp.fullName || emp.name || 'Unknown',
            role: emp.role || 'employee',
            teamName: emp.team_name || '',
            productivity,
            completedTasks,
            totalTasks,
            completionRate,
            overdueTasks: empTasks.filter(t => normalizeReportTaskStatus(t.status) !== 'completed' && !!t.due_date && new Date(t.due_date) < new Date()).length,
        };
    }).sort((a, b) => (b.productivity - a.productivity) || (b.completedTasks - a.completedTasks));

    const completedTasks = tasks.filter(t => normalizeReportTaskStatus(t.status) === 'completed').length;
    const activeEmployees = employees.filter(emp => {
        const empTasks = tasksByEmployee.get(String(emp.id || '').trim()) || [];
        return empTasks.length || String(emp.last_login || '').trim();
    }).length;
    const avgProductivity = performance.length
        ? Math.round(performance.reduce((sum, item) => sum + Number(item.productivity || 0), 0) / performance.length)
        : 0;

    return {
        employeePerformance: performance,
        avgProductivity,
        totalTasks: tasks.length,
        completedTasks,
        completionRate: tasks.length ? Math.round((completedTasks / tasks.length) * 100) : 0,
        activeEmployees,
    };
}

function getAnalyticsEndpoint() {
    if (window.location.pathname.indexOf('/teamlead/') === 0) {
        return '/api/teamlead/analytics';
    }
    const helpers = window.TaskViseDashboardHelpers;
    const context = helpers && typeof helpers.getDashboardContext === 'function'
        ? helpers.getDashboardContext()
        : null;
    if (context && context.scope === 'teamlead') {
        return '/api/teamlead/analytics';
    }
    return '/api/manager/analytics';
}

async function loadReportsData() {
    try {
        const response = await fetch(getAnalyticsEndpoint(), { credentials: 'same-origin' });
        if (!response.ok) {
            throw new Error('Failed to fetch analytics');
        }

        latestManagerAnalytics = await response.json();
        if (!latestManagerAnalytics || !Array.isArray(latestManagerAnalytics.employeePerformance)) {
            latestManagerAnalytics = buildFallbackAnalytics();
        }

        employeePerformance = latestManagerAnalytics.employeePerformance || [];
        renderChart();
        updateStats(latestManagerAnalytics);
    } catch (error) {
        console.error('Error loading reports data:', error);
        latestManagerAnalytics = buildFallbackAnalytics();
        employeePerformance = latestManagerAnalytics.employeePerformance || [];
        renderChart();
        updateStats(latestManagerAnalytics);
        showNotification('Loaded fallback report data', 'info');
    }
}

function renderChart() {
    if (!employeePerformance || employeePerformance.length === 0) {
        document.getElementById('performanceChart').innerHTML = '<div style="text-align:center;padding:2rem;color:#64748b;">No employee data available</div>';
        return;
    }
    
    const chart = document.getElementById('performanceChart');
    const tooltip = document.getElementById('chartTooltip');
    chart.innerHTML = '';
    if (tooltip) {
        tooltip.classList.remove('visible');
    }
    
    const chartBars = document.createElement('div');
    chartBars.className = 'chart-bars';
    
    const maxProductivity = Math.max(...employeePerformance.map(emp => emp.productivity), 1);
    const maxTasks = Math.max(...employeePerformance.map(emp => emp.completedTasks), 1);
    
    employeePerformance.forEach(employee => {
        const barGroup = document.createElement('div');
        barGroup.className = 'bar-group';
        
        const employeeName = document.createElement('div');
        employeeName.className = 'employee-name';
        employeeName.textContent = employee.name || employee.fullName || 'Unknown';
        
        const barsContainer = document.createElement('div');
        barsContainer.className = 'bars-container';
        
        // Productivity bar
        const productivityBar = document.createElement('div');
        productivityBar.className = 'bar productivity-bar';
        productivityBar.style.height = `${(employee.productivity / maxProductivity) * 80}%`;
        
        // Tasks bar
        const tasksBar = document.createElement('div');
        tasksBar.className = 'bar tasks-bar';
        tasksBar.style.height = `${(employee.completedTasks / maxTasks) * 80}%`;

        [productivityBar, tasksBar].forEach((bar) => {
            bar.addEventListener('mouseenter', (event) => showChartTooltip(event, employee));
            bar.addEventListener('mousemove', (event) => showChartTooltip(event, employee));
            bar.addEventListener('mouseleave', hideChartTooltip);
        });
        
        barsContainer.appendChild(productivityBar);
        barsContainer.appendChild(tasksBar);
        
        barGroup.appendChild(employeeName);
        barGroup.appendChild(barsContainer);
        chartBars.appendChild(barGroup);
    });
    
    chart.appendChild(chartBars);
}

function showChartTooltip(event, employee) {
    const tooltip = document.getElementById('chartTooltip');
    if (!tooltip || !employee) return;
    tooltip.innerHTML = `
        <strong>${employee.name || 'Unknown'}</strong>
        <span>${employee.role ? employee.role.replace('_', ' ') : 'employee'}${employee.teamName ? ` | ${employee.teamName}` : ''}</span>
        <span>Productivity: ${Number(employee.productivity || 0)}%</span>
        <span>Completed Tasks: ${Number(employee.completedTasks || 0)} / ${Number(employee.totalTasks || 0)}</span>
        <span>Completion Rate: ${Number(employee.completionRate || 0)}%</span>
        <span>Overdue Tasks: ${Number(employee.overdueTasks || 0)}</span>
    `;
    tooltip.classList.add('visible');
    const containerRect = event.currentTarget.closest('.chart-container').getBoundingClientRect();
    tooltip.style.left = `${event.clientX - containerRect.left + 16}px`;
    tooltip.style.top = `${event.clientY - containerRect.top - 12}px`;
}

function hideChartTooltip() {
    const tooltip = document.getElementById('chartTooltip');
    if (tooltip) {
        tooltip.classList.remove('visible');
    }
}

function updateStats(analytics) {
    if (!analytics || !employeePerformance || employeePerformance.length === 0) {
        document.getElementById('avgProductivity').textContent = '0%';
        document.getElementById('totalTasks').textContent = '0';
        document.getElementById('completionRate').textContent = '0%';
        document.getElementById('activeEmployees').textContent = '0';
        return;
    }

    document.getElementById('avgProductivity').textContent = `${Math.round(Number(analytics.avgProductivity || 0))}%`;
    document.getElementById('totalTasks').textContent = String(Number(analytics.totalTasks || 0));
    document.getElementById('completionRate').textContent = `${Math.round(Number(analytics.completionRate || 0))}%`;
    document.getElementById('activeEmployees').textContent = String(Number(analytics.activeEmployees || employeePerformance.length || 0));
}

function csvCell(value) {
    const text = String(value == null ? '' : value);
    if (/[",\n]/.test(text)) {
        return `"${text.replace(/"/g, '""')}"`;
    }
    return text;
}

function exportReport() {
    const analytics = latestManagerAnalytics || buildFallbackAnalytics();
    const scope = window.location.pathname.indexOf('/teamlead/') === 0
        ? 'teamlead'
        : window.location.pathname.indexOf('/hr/') === 0
            ? 'hr'
            : 'manager';
    const generatedAt = analytics.generatedAt || new Date().toISOString();
    const summaryRows = [
        ['Metric', 'Value'],
        ['Generated At', generatedAt],
        ['Average Productivity', `${Math.round(Number(analytics.avgProductivity || 0))}%`],
        ['Total Tasks', Number(analytics.totalTasks || 0)],
        ['Completed Tasks', Number(analytics.completedTasks || 0)],
        ['Completion Rate', `${Math.round(Number(analytics.completionRate || 0))}%`],
        ['Active Employees', Number(analytics.activeEmployees || employeePerformance.length || 0)],
        [''],
        ['Employee', 'Role', 'Team', 'Productivity', 'Completed Tasks', 'Total Tasks', 'Completion Rate', 'Overdue Tasks']
    ];
    const employeeRows = (employeePerformance || []).map((employee) => ([
        employee.name || 'Unknown',
        employee.role || 'employee',
        employee.teamName || '',
        `${Number(employee.productivity || 0)}%`,
        Number(employee.completedTasks || 0),
        Number(employee.totalTasks || 0),
        `${Number(employee.completionRate || 0)}%`,
        Number(employee.overdueTasks || 0)
    ]));
    const csv = [...summaryRows, ...employeeRows]
        .map((row) => row.map(csvCell).join(','))
        .join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `taskvise-${scope}-report-${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
    showNotification('Report exported successfully', 'success');
}

function refreshData() {
    showNotification('Refreshing data...', 'success');
    loadReportsData().then(() => {
        showNotification('Data refreshed successfully', 'success');
    }).catch(() => {
        showNotification('Failed to refresh data', 'error');
    });
}

function showNotification(message, type = 'info') {
    if (window.managerDashboard) {
        window.managerDashboard.showNotification(message, type);
    } else {
        alert(`${type.toUpperCase()}: ${message}`);
    }
}
</script>
