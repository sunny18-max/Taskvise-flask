<div class="view-container">
    <!-- Reports Content -->
    <div class="reports-content">
        <div class="chart-card">
            <div class="chart-header">
                <h3 class="chart-title">Employee Performance Overview</h3>
                <div class="chart-actions">
                    <button class="btn btn-outline" onclick="exportReport()">
                        <i class="fas fa-download"></i>
                        Export
                    </button>
                    <button class="btn btn-outline" onclick="refreshData()">
                        <i class="fas fa-sync-alt"></i>
                        Refresh
                    </button>
                </div>
            </div>
            
            <div class="chart-container">
                <div id="performanceChart" class="chart"></div>
            </div>
            
            <div class="chart-legend">
                <div class="legend-item">
                    <div class="legend-color productivity"></div>
                    <span>Productivity %</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color completed-tasks"></div>
                    <span>Completed Tasks</span>
                </div>
            </div>
        </div>
        
        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number" id="avgProductivity">0%</div>
                    <div class="stat-label">Average Productivity</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-tasks"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number" id="totalTasks">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number" id="completionRate">0%</div>
                    <div class="stat-label">Completion Rate</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number" id="activeEmployees">0</div>
                    <div class="stat-label">Active Employees</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Real employee performance data
let employeePerformance = [];

// Initialize chart when page loads
document.addEventListener('DOMContentLoaded', function() {
    loadReportsData();
});

async function loadReportsData() {
    try {
        // Fetch employees and tasks from API
        const [employeesRes, tasksRes] = await Promise.all([
            fetch('/api/manager/employees', { credentials: 'same-origin' }),
            fetch('/api/manager/tasks', { credentials: 'same-origin' })
        ]);
        
        if (!employeesRes.ok || !tasksRes.ok) throw new Error('Failed to fetch data');
        
        const employees = await employeesRes.json();
        const tasks = await tasksRes.json();
        
        // Calculate performance metrics for each employee
        employeePerformance = employees.map(emp => {
            const empTasks = tasks.filter(t => String(t.employee_id || t.employeeId) === String(emp.id));
            const completedTasks = empTasks.filter(t => (t.status || '').toLowerCase() === 'completed').length;
            const totalTasks = empTasks.length;
            const productivity = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
            
            return {
                id: emp.id,
                fullName: emp.fullName || emp.name || 'Unknown',
                productivity: productivity,
                completedTasks: completedTasks,
                totalTasks: totalTasks
            };
        });
        
        renderChart();
        updateStats();
    } catch (error) {
        console.error('Error loading reports data:', error);
        showNotification('Failed to load reports data', 'error');
    }
}

function renderChart() {
    if (!employeePerformance || employeePerformance.length === 0) {
        document.getElementById('performanceChart').innerHTML = '<div style="text-align:center;padding:2rem;color:#64748b;">No employee data available</div>';
        return;
    }
    
    const chart = document.getElementById('performanceChart');
    chart.innerHTML = '';
    
    const chartBars = document.createElement('div');
    chartBars.className = 'chart-bars';
    
    const maxProductivity = Math.max(...employeePerformance.map(emp => emp.productivity), 1);
    const maxTasks = Math.max(...employeePerformance.map(emp => emp.completedTasks), 1);
    
    employeePerformance.forEach(employee => {
        const barGroup = document.createElement('div');
        barGroup.className = 'bar-group';
        
        const employeeName = document.createElement('div');
        employeeName.className = 'employee-name';
        employeeName.textContent = employee.fullName;
        
        const barsContainer = document.createElement('div');
        barsContainer.className = 'bars-container';
        
        // Productivity bar
        const productivityBar = document.createElement('div');
        productivityBar.className = 'bar productivity-bar';
        productivityBar.style.height = `${(employee.productivity / maxProductivity) * 80}%`;
        productivityBar.title = `Productivity: ${employee.productivity}%`;
        
        // Tasks bar
        const tasksBar = document.createElement('div');
        tasksBar.className = 'bar tasks-bar';
        tasksBar.style.height = `${(employee.completedTasks / maxTasks) * 80}%`;
        tasksBar.title = `Completed Tasks: ${employee.completedTasks}`;
        
        barsContainer.appendChild(productivityBar);
        barsContainer.appendChild(tasksBar);
        
        barGroup.appendChild(employeeName);
        barGroup.appendChild(barsContainer);
        chartBars.appendChild(barGroup);
    });
    
    chart.appendChild(chartBars);
}

function updateStats() {
    if (!employeePerformance || employeePerformance.length === 0) {
        document.getElementById('avgProductivity').textContent = '0%';
        document.getElementById('totalTasks').textContent = '0';
        document.getElementById('completionRate').textContent = '0%';
        document.getElementById('activeEmployees').textContent = '0';
        return;
    }
    
    const totalCompleted = employeePerformance.reduce((sum, emp) => sum + emp.completedTasks, 0);
    const totalAssigned = employeePerformance.reduce((sum, emp) => sum + emp.totalTasks, 0);
    const avgProductivity = employeePerformance.reduce((sum, emp) => sum + emp.productivity, 0) / employeePerformance.length;
    const completionRate = totalAssigned > 0 ? (totalCompleted / totalAssigned) * 100 : 0;
    
    document.getElementById('avgProductivity').textContent = `${Math.round(avgProductivity)}%`;
    document.getElementById('totalTasks').textContent = totalCompleted;
    document.getElementById('completionRate').textContent = `${Math.round(completionRate)}%`;
    document.getElementById('activeEmployees').textContent = employeePerformance.length;
}

function exportReport() {
    showNotification('Export feature coming soon', 'info');
}

function refreshData() {
    showNotification('Refreshing data...', 'success');
    loadReportsData().then(() => {
        showNotification('Data refreshed successfully', 'success');
    }).catch(() => {
        showNotification('Failed to refresh data', 'error');
    });
}

function showNotification(message, type = 'info') {
    if (window.managerDashboard) {
        window.managerDashboard.showNotification(message, type);
    } else {
        alert(`${type.toUpperCase()}: ${message}`);
    }
}
</script>
