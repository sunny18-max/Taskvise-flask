<div class="notifications-view">
  <div class="notifications-content">
    <div class="header-actions">
      <div class="header-info">
        <h2>Notifications</h2>
        <p id="notificationSubtitle">Loading the latest team updates...</p>
      </div>
      <div class="action-buttons">
        <button class="btn btn-outline" id="markAllReadBtn" disabled>
          <i class="fas fa-check-circle"></i>
          Mark All as Read
        </button>
        <button class="btn btn-outline" id="refreshBtn">
          <i class="fas fa-sync-alt"></i>
          Refresh
        </button>
      </div>
    </div>

    <div class="notification-filters" id="notificationFilters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="unread">Unread</button>
      <button class="filter-btn" data-filter="task">Tasks</button>
      <button class="filter-btn" data-filter="project">Projects</button>
      <button class="filter-btn" data-filter="leave">Leave</button>
      <button class="filter-btn" data-filter="help">Help</button>
      <button class="filter-btn" data-filter="system">System</button>
    </div>

    <div class="notifications-container" id="notificationsContainer">
      <div class="empty-state">
        <i class="fas fa-spinner fa-spin"></i>
        <h4>Loading notifications...</h4>
        <p>TaskVise is pulling the latest activity for this dashboard.</p>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  const state = {
    items: [],
    filter: 'all',
    loading: false
  };

  function getDashboardApi() {
    return window.managerDashboard || window.teamLeadDashboard || null;
  }

  function showMessage(message, type) {
    const dashboardApi = getDashboardApi();
    if (dashboardApi && typeof dashboardApi.showNotification === 'function') {
      dashboardApi.showNotification(message, type || 'info');
      return;
    }
    if (typeof window.showNotification === 'function') {
      window.showNotification(message, type || 'info');
      return;
    }
    console.log((type || 'info').toUpperCase() + ': ' + message);
  }

  function getNotificationsApiBase() {
    const helpers = window.TaskViseDashboardHelpers;
    const context = helpers && typeof helpers.getDashboardContext === 'function'
      ? helpers.getDashboardContext()
      : null;
    if (context && context.scope === 'teamlead') {
      return '/api/teamlead/notifications';
    }
    return '/api/manager/notifications';
  }

  function getSeedNotifications() {
    const dashboardApi = getDashboardApi();
    return dashboardApi && Array.isArray(dashboardApi.notifications) ? dashboardApi.notifications : [];
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function normalizeType(type) {
    const value = String(type || 'system').toLowerCase();
    if (value.indexOf('task') !== -1) return 'task';
    if (value.indexOf('project') !== -1) return 'project';
    if (value.indexOf('leave') !== -1) return 'leave';
    if (value.indexOf('help') !== -1) return 'help';
    return 'system';
  }

  function iconForType(type) {
    if (type === 'task') return 'tasks';
    if (type === 'project') return 'project-diagram';
    if (type === 'leave') return 'calendar-check';
    if (type === 'help') return 'life-ring';
    return 'bell';
  }

  function formatDate(value) {
    if (!value) return 'Just now';
    const normalized = String(value).replace(' ', 'T');
    const parsed = new Date(normalized);
    if (Number.isNaN(parsed.getTime())) {
      return String(value);
    }
    return parsed.toLocaleString([], {
      year: 'numeric',
      month: 'short',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function filteredItems() {
    if (state.filter === 'all') return state.items;
    if (state.filter === 'unread') return state.items.filter((item) => !item.is_read);
    return state.items.filter((item) => normalizeType(item.type) === state.filter);
  }

  function updateHeader() {
    const subtitle = document.getElementById('notificationSubtitle');
    const markAllBtn = document.getElementById('markAllReadBtn');
    const unreadCount = state.items.filter((item) => !item.is_read).length;

    if (subtitle) {
      if (!state.items.length) {
        subtitle.textContent = 'No updates yet for this workspace.';
      } else if (unreadCount > 0) {
        subtitle.textContent = `${unreadCount} unread notification${unreadCount === 1 ? '' : 's'} across your scoped updates.`;
      } else {
        subtitle.textContent = 'All caught up across your team and project activity.';
      }
    }

    if (markAllBtn) {
      markAllBtn.disabled = unreadCount === 0 || state.loading;
    }
  }

  function renderLoading(message) {
    const container = document.getElementById('notificationsContainer');
    if (!container) return;
    container.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-spinner fa-spin"></i>
        <h4>${escapeHtml(message || 'Loading notifications...')}</h4>
        <p>Please wait a moment.</p>
      </div>
    `;
  }

  function render() {
    const container = document.getElementById('notificationsContainer');
    if (!container) return;

    updateHeader();
    const items = filteredItems();
    if (!items.length) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-bell-slash"></i>
          <h4>No notifications found</h4>
          <p>Assignments, escalations, approvals, and project updates will appear here.</p>
        </div>
      `;
      return;
    }

    container.innerHTML = items.map((item) => {
      const type = normalizeType(item.type);
      const typeLabel = type.charAt(0).toUpperCase() + type.slice(1);
      return `
        <article class="notification-card ${type} ${item.is_read ? 'read' : 'unread'}">
          <div class="notification-icon">
            <i class="fas fa-${iconForType(type)}"></i>
          </div>
          <div class="notification-body">
            <div class="notification-topline">
              <h3>${escapeHtml(item.title || 'Notification')}</h3>
              <div class="notification-tags">
                ${item.is_read ? '' : '<span class="status-chip status-new">New</span>'}
                <span class="status-chip status-type">${escapeHtml(typeLabel)}</span>
              </div>
            </div>
            <p class="notification-message">${escapeHtml(item.message || '')}</p>
            <div class="notification-meta">
              <span><i class="fas fa-clock"></i> ${escapeHtml(formatDate(item.created_at))}</span>
            </div>
          </div>
          <div class="notification-actions-col">
            ${item.is_read ? '' : `
              <button class="btn btn-outline btn-sm" data-action="read" data-id="${escapeHtml(item.id)}">
                <i class="fas fa-check"></i>
                Mark Read
              </button>
            `}
          </div>
        </article>
      `;
    }).join('');
  }

  async function loadNotifications(options) {
    state.loading = true;
    updateHeader();
    if (!state.items.length) {
      state.items = getSeedNotifications();
      if (state.items.length) {
        render();
      } else {
        renderLoading((options && options.message) || 'Loading notifications...');
      }
    } else {
      renderLoading((options && options.message) || 'Loading notifications...');
    }
    try {
      const response = await fetch(getNotificationsApiBase(), {
        cache: 'no-store',
        credentials: 'same-origin'
      });
      if (!response.ok) {
        throw new Error('Failed to load notifications');
      }
      const payload = await response.json();
      state.items = Array.isArray(payload) ? payload : [];
      const dashboardApi = getDashboardApi();
      if (dashboardApi) {
        dashboardApi.notifications = state.items;
      }
      render();
    } catch (error) {
      console.error(error);
      if (state.items.length) {
        render();
        showMessage('Loaded cached notifications while the live feed was unavailable', 'warning');
      } else {
        const container = document.getElementById('notificationsContainer');
        if (container) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-triangle-exclamation"></i>
              <h4>Unable to load notifications</h4>
              <p>Try refreshing again in a moment.</p>
            </div>
          `;
        }
        showMessage('Unable to load notifications', 'error');
      }
    } finally {
      state.loading = false;
      updateHeader();
    }
  }

  async function markAllRead() {
    if (state.loading) return;
    try {
      const response = await fetch(`${getNotificationsApiBase()}/read-all`, {
        method: 'POST',
        credentials: 'same-origin'
      });
      if (!response.ok) {
        throw new Error('Failed to mark notifications as read');
      }
      state.items = state.items.map((item) => ({ ...item, is_read: true }));
      render();
      showMessage('All notifications marked as read', 'success');
    } catch (error) {
      console.error(error);
      showMessage('Unable to mark notifications as read', 'error');
    }
  }

  async function markRead(notificationId) {
    try {
      const response = await fetch(`${getNotificationsApiBase()}/${encodeURIComponent(notificationId)}/read`, {
        method: 'POST',
        credentials: 'same-origin'
      });
      if (!response.ok) {
        throw new Error('Failed to update notification');
      }
      state.items = state.items.map((item) => (
        String(item.id) === String(notificationId) ? { ...item, is_read: true } : item
      ));
      render();
      showMessage('Notification marked as read', 'success');
    } catch (error) {
      console.error(error);
      showMessage('Unable to update notification', 'error');
    }
  }

  document.addEventListener('click', function (event) {
    const filterButton = event.target.closest('.filter-btn');
    if (filterButton && filterButton.closest('#notificationFilters')) {
      state.filter = filterButton.dataset.filter || 'all';
      document.querySelectorAll('#notificationFilters .filter-btn').forEach((button) => {
        button.classList.toggle('active', button === filterButton);
      });
      render();
      return;
    }

    const actionButton = event.target.closest('[data-action="read"]');
    if (actionButton) {
      markRead(actionButton.dataset.id);
    }
  });

  document.addEventListener('DOMContentLoaded', function () {
    const refreshBtn = document.getElementById('refreshBtn');
    const markAllBtn = document.getElementById('markAllReadBtn');

    if (refreshBtn) {
      refreshBtn.addEventListener('click', function () {
        loadNotifications({ message: 'Refreshing notifications...' });
      });
    }

    if (markAllBtn) {
      markAllBtn.addEventListener('click', markAllRead);
    }

    loadNotifications();
  });
})();
</script>
