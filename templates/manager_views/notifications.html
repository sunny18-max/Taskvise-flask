<div class="notifications-view">
  <div class="notifications-content">
    <!-- Header Actions -->
    <div class="header-actions">
      <div class="header-info">
        <h2>Notifications</h2>
        <p id="notificationSubtitle">All caught up!</p>
      </div>
      <div class="action-buttons">
        <button class="btn btn-outline" id="markAllReadBtn" style="display: none;">
          <i class="fas fa-check-circle"></i>
          Mark All as Read
        </button>
        <button class="btn btn-outline" id="refreshBtn">
          <i class="fas fa-sync-alt"></i>
          Refresh
        </button>
      </div>
    </div>

    <!-- Notifications List -->
    <div class="notifications-container" id="notificationsContainer">
      <!-- Notifications will be populated here -->
      <div class="empty-state">
        <i class="fas fa-bell"></i>
        <h4>No notifications</h4>
        <p>You're all caught up! Notifications will appear here when you have new updates.</p>
      </div>
    </div>
  </div>
</div>

<script>
// Notifications Data and Functions
let notifications = [];

// Initialize notifications
document.addEventListener('DOMContentLoaded', function() {
  loadNotifications();
  setupNotificationEventListeners();
});

function loadNotifications() {
  // Load from localStorage or API
  const savedNotifications = localStorage.getItem('user-notifications');
  if (savedNotifications) {
    notifications = JSON.parse(savedNotifications);
  }
  
  updateNotificationsDisplay();
}

function setupNotificationEventListeners() {
  document.getElementById('refreshBtn').addEventListener('click', refreshNotifications);
  document.getElementById('markAllReadBtn').addEventListener('click', markAllAsRead);
}

function refreshNotifications() {
  const refreshBtn = document.getElementById('refreshBtn');
  const icon = refreshBtn.querySelector('i');
  
  // Add spinning animation
  icon.classList.add('fa-spin');
  refreshBtn.disabled = true;
  
  // Simulate API call
  setTimeout(() => {
    loadNotifications();
    icon.classList.remove('fa-spin');
    refreshBtn.disabled = false;
    showNotification('Notifications updated', 'success');
  }, 1000);
}

function markAllAsRead() {
  notifications = notifications.map(notif => ({ ...notif, read: true }));
  saveNotifications();
  updateNotificationsDisplay();
  showNotification('All notifications marked as read', 'success');
}

function markAsRead(notificationId) {
  notifications = notifications.map(notif =>
    notif.id === notificationId ? { ...notif, read: true } : notif
  );
  saveNotifications();
  updateNotificationsDisplay();
  showNotification('Notification marked as read', 'success');
}

function saveNotifications() {
  localStorage.setItem('user-notifications', JSON.stringify(notifications));
}

function updateNotificationsDisplay() {
  const container = document.getElementById('notificationsContainer');
  const subtitle = document.getElementById('notificationSubtitle');
  const markAllBtn = document.getElementById('markAllReadBtn');
  
  const unreadCount = notifications.filter(notif => !notif.read).length;
  
  // Update subtitle
  if (unreadCount > 0) {
    subtitle.textContent = `${unreadCount} unread notification${unreadCount !== 1 ? 's' : ''}`;
    markAllBtn.style.display = 'flex';
  } else {
    subtitle.textContent = 'All caught up!';
    markAllBtn.style.display = 'none';
  }
  
  if (notifications.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-bell"></i>
        <h4>No notifications</h4>
        <p>You're all caught up! Notifications will appear here when you have new updates.</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = notifications.map(notif => `
    <div class="notification-item ${notif.read ? 'read' : 'unread'} ${getNotificationTypeClass(notif.type)}">
      <div class="notification-content">
        <div class="notification-icon">
          ${getNotificationIcon(notif.type)}
        </div>
        <div class="notification-details">
          <div class="notification-header">
            <h3 class="notification-title">${notif.title}</h3>
            <div class="notification-badges">
              ${!notif.read ? '<span class="badge badge-new">New</span>' : ''}
              <span class="badge badge-type">${notif.type.replace('_', ' ')}</span>
            </div>
          </div>
          <p class="notification-message">${notif.message}</p>
          <div class="notification-meta">
            <span class="notification-date">
              ${formatDate(notif.createdAt)}
            </span>
            ${notif.taskId ? `
              <span class="badge badge-secondary">
                Task: ${notif.taskId.slice(0, 8)}...
              </span>
            ` : ''}
            ${notif.projectId ? `
              <span class="badge badge-secondary">
                Project: ${notif.projectId.slice(0, 8)}...
              </span>
            ` : ''}
          </div>
        </div>
      </div>
      ${!notif.read ? `
        <button class="btn-icon mark-read-btn" onclick="markAsRead('${notif.id}')" title="Mark as read">
          <i class="fas fa-check-circle"></i>
        </button>
      ` : ''}
    </div>
  `).join('');
}

function getNotificationIcon(type) {
  switch (type) {
    case 'task_assigned': return '📋';
    case 'task_completed': return '✅';
    case 'project_assigned': return '📁';
    case 'leave_status_update': return '📅';
    case 'leave_reminder': return '⏰';
    default: return '🔔';
  }
}

function getNotificationTypeClass(type) {
  switch (type) {
    case 'task_assigned': return 'type-task';
    case 'task_completed': return 'type-completed';
    case 'project_assigned': return 'type-project';
    case 'leave_status_update': return 'type-leave';
    case 'leave_reminder': return 'type-reminder';
    default: return 'type-default';
  }
}

function formatDate(dateString) {
  const date = new Date(dateString);
  return date.toLocaleDateString('en-US', {
    month: 'short',
    day: 'numeric',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
}

function showNotification(message, type) {
  const notification = document.createElement('div');
  notification.className = `notification ${type}`;
  notification.innerHTML = `
    <div class="notification-content">
      <i class="fas fa-${type === 'success' ? 'check' : 'info'}"></i>
      <span>${message}</span>
    </div>
  `;
  
  document.body.appendChild(notification);
  
  setTimeout(() => {
    notification.remove();
  }, 3000);
}

// Add some sample notifications for demo
function addSampleNotifications() {
  const sampleNotifications = [
    {
      id: '1',
      title: 'Task Assigned',
      message: 'You have been assigned to "Implement user authentication"',
      type: 'task_assigned',
      read: false,
      createdAt: new Date().toISOString(),
      taskId: 'task_123456'
    },
    {
      id: '2',
      title: 'Project Update',
      message: 'The website redesign project has been completed',
      type: 'project_assigned',
      read: true,
      createdAt: new Date(Date.now() - 86400000).toISOString(),
      projectId: 'project_789'
    }
  ];
  
  notifications = [...sampleNotifications, ...notifications];
  saveNotifications();
  updateNotificationsDisplay();
}

// Uncomment the line below to add sample notifications for testing
// addSampleNotifications();
</script>
