<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskVise Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.22), transparent 28%),
                radial-gradient(circle at bottom right, rgba(249, 115, 22, 0.22), transparent 24%),
                linear-gradient(135deg, #0f172a, #111827 55%, #1e293b);
            display: grid;
            place-items: center;
            padding: 2rem 1rem;
        }

        .founder-card {
            width: min(100%, 480px);
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(148, 163, 184, 0.22);
            box-shadow: 0 30px 70px rgba(15, 23, 42, 0.35);
        }

        .founder-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            background: #dbeafe;
            color: #1d4ed8;
            font-size: 0.8rem;
            font-weight: 700;
        }

        h1 {
            margin: 1rem 0 0.5rem;
            font-size: 1.9rem;
            color: #0f172a;
        }

        p {
            color: #475569;
            margin: 0 0 1.5rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 0.35rem;
        }

        input {
            width: 100%;
            padding: 0.95rem 1rem;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            outline: none;
            font-size: 1rem;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 0.95rem 1rem;
            background: linear-gradient(135deg, #2563eb, #0f766e);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }

        .error {
            margin-bottom: 1rem;
            padding: 0.9rem 1rem;
            border-radius: 12px;
            background: #fee2e2;
            color: #b91c1c;
            font-weight: 600;
        }

        .meta {
            margin-top: 1rem;
            font-size: 0.84rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="founder-card">
        <span class="founder-badge">
            <i class="fas fa-crown"></i>
            Founder Access
        </span>
        <h1>TaskVise Platform Console</h1>
        <p>Separate founder application for platform tracking, company controls, payroll visibility, and global TaskVise statistics.</p>

        {% if error %}
        <div class="error">
            <i class="fas fa-circle-exclamation"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div>
                <label for="username">Founder Email</label>
                <input id="username" name="username" type="email" placeholder="saathvikk202@gmail.com" required>
            </div>
            <div>
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Enter founder password" required>
            </div>
            <button type="submit">
                <i class="fas fa-shield-halved"></i>
                Open Founder Dashboard
            </button>
        </form>

        <div class="meta">
            Founder account: <strong>saathvikk202@gmail.com</strong> / <strong>saathvik@2026</strong>
        </div>
    </div>
</body>
</html>
